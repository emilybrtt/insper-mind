spring.application.name=insperMind
# --- CONEXÃO COM O POSTGRESQL (AIVEN) ---
# A URL do Aiven convertida para o formato JDBC
spring.datasource.url=jdbc:postgresql://insper-mind-insper-mind.c.aivencloud.com:10001/defaultdb?ssl=require
spring.datasource.username=${AIVEN_USERNAME}
spring.datasource.password=${AIVEN_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

# --- CONFIGURAÇÕES DO HIBERNATE (JPA) ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# NOTA: Remova as configurações do H2 Console (spring.h2.console.*),
# pois elas não funcionam com o PostgreSQL.