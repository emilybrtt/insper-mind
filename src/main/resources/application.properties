spring.application.name=insperMind

# --- CONEXĂO COM O POSTGRESQL (AIVEN) ---
spring.datasource.url=jdbc:postgresql://insper-mind-insper-mind.c.aivencloud.com:10001/defaultdb?ssl=require
spring.datasource.username=${AIVEN_USERNAME}
spring.datasource.password=${AIVEN_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

# --- CONFIGURAÇŐES DO HIBERNATE (JPA) ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect